# ~/.config/mpv/mpv.conf — example for a streaming-media daemon stack
# Replace "ncm" with your service prefix throughout.

# ── Audio-only (no video window) ──
no-video
no-terminal
quiet

# ── Idle mode: stay alive with no playlist, waiting for IPC loadfile commands ──
idle=yes
force-window=no
audio-display=no
no-osc

# ── IPC server: the only way the rest of the stack talks to mpv ──
input-ipc-server=/tmp/ncm-mpv.sock

# ── Suppress OSD messages that pollute stderr ──
script-opts=osc-visibility=never,console-visibility=never

# ── Don't bind media keys (waybar handles this via playerctl) ──
no-input-default-bindings

# ── PipeWire-friendly defaults (Debian Trixie) ──
# ao=pipewire is auto-detected, no need to set explicitly

# ── Logging (uncomment for debugging) ──
# log-file=/tmp/ncm-mpv.log
# msg-level=all=info